version: '3.8'

# Production-Ready Setup mit Monitoring Stack
# Startet: PDF Converter + Prometheus + Grafana

services:
  # ==========================================
  # PDF Converter Service
  # ==========================================
  pdfconverter:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: pdfconverter

    ports:
      - "8080:8080"

    environment:
      - HEALTH_PATH=/health
      - METRICS_PATH=/metrics
      - CONVERTER_PATH=/api/pdfconverter

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

      # Replikation für Load Balancing (Docker Swarm)
      # replicas: 3

    restart: unless-stopped

    networks:
      - monitoring

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "com.pdfconverter.service=api"

  # ==========================================
  # Prometheus - Metrics Collection
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

    restart: unless-stopped

    networks:
      - monitoring

    labels:
      - "com.pdfconverter.service=monitoring"

  # ==========================================
  # Grafana - Visualization Dashboard
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana

    ports:
      - "3000:3000"

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=

    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

    restart: unless-stopped

    networks:
      - monitoring

    depends_on:
      - prometheus

    labels:
      - "com.pdfconverter.service=monitoring"

  # ==========================================
  # Node Exporter - System Metrics (Optional)
  # ==========================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter

    ports:
      - "9100:9100"

    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

    restart: unless-stopped

    networks:
      - monitoring

    labels:
      - "com.pdfconverter.service=monitoring"

# ==========================================
# Networks
# ==========================================
networks:
  monitoring:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
