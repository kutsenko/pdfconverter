[pytest]
# Pytest configuration for PDF Converter Service

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Add current directory to Python path
pythonpath = .

# Output options
addopts =
    # Show extra test summary info
    -ra
    # Show detailed assertion output
    -vv
    # Show local variables in tracebacks
    --showlocals
    # Coverage options
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    # Stop on first failure (remove for CI)
    # -x
    # Show warnings
    -W default
    # Strict markers
    --strict-markers
    # Asyncio mode
    --asyncio-mode=auto

# Markers for organizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Tests that take a long time to run
    asyncio: Async tests
    real_conversion: Tests that perform real PDF conversion (no mocks)

# Minimum code coverage percentage
# Fail if coverage is below this threshold
# Uncomment for CI/CD
# addopts = --cov-fail-under=80

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Ignore certain warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test timeout (in seconds)
# Uncomment if you have pytest-timeout installed
# timeout = 300
