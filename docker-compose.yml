version: '3.8'

services:
  pdfconverter:
    # Service für PDF zu PDF/A Konvertierung
    build:
      context: .
      dockerfile: Dockerfile

    # Alternative: Verwende ein bereits gebautes Image
    # image: pdfconverter:latest

    container_name: pdfconverter

    # Port Mapping: Host:Container
    # Standard-Port ist 8080
    ports:
      - "8080:8080"

    # Environment Variables Configuration
    # Override these values via .env file or set them here
    # Format: VARIABLE_NAME=${VARIABLE_NAME:-default_value}
    environment:
      # API Endpoint Paths (use defaults if not set)
      - HEALTH_PATH=${HEALTH_PATH:-/health}
      - METRICS_PATH=${METRICS_PATH:-/metrics}
      - CONVERTER_PATH=${CONVERTER_PATH:-/api/pdfconverter}

      # Performance & Concurrency Configuration
      - OCR_MAX_WORKERS=${OCR_MAX_WORKERS:-8}        # Max concurrent PDF conversions
      - OCRMYPDF_JOBS=${OCRMYPDF_JOBS:-4}            # Parallel processing per PDF
      - UVICORN_WORKERS=${UVICORN_WORKERS:-4}        # Uvicorn worker processes

      # PDF Optimization Configuration
      - PDF_TEXT_OPTIMIZE=${PDF_TEXT_OPTIMIZE:-1}
      - PDF_SCANNED_OPTIMIZE=${PDF_SCANNED_OPTIMIZE:-1}
      - PDF_MIXED_OPTIMIZE=${PDF_MIXED_OPTIMIZE:-1}
      - PDF_UNKNOWN_OPTIMIZE=${PDF_UNKNOWN_OPTIMIZE:-0}

      # Optional Configuration (uncomment and set as needed)
      # - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # - TZ=${TZ:-UTC}
      # - MAX_PDF_SIZE=${MAX_PDF_SIZE:-52428800}  # 50MB in bytes

    # Health Check Konfiguration
    # Prüft regelmäßig ob der Service erreichbar ist
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Resource Limits
    # Angepasst für hohe Parallelisierung (4 workers × 8 concurrent = 32 parallel conversions)
    deploy:
      resources:
        limits:
          cpus: '4.0'      # Maximal 4 CPU Cores (für jobs=4)
          memory: 4G       # Maximal 4GB RAM (4 workers × 8 concurrent × ~100MB)
        reservations:
          cpus: '2.0'      # Mindestens 2 CPU Cores
          memory: 2G       # Mindestens 2GB RAM

    # Restart Policy
    # Container wird automatisch neu gestartet bei Fehler
    restart: unless-stopped

    # Optionale Volume Mounts
    # Auskommentiert - aktivieren falls benötigt
    # volumes:
    #   # Persistente Logs
    #   - ./logs:/app/logs
    #   # Temporäre Dateien (für bessere Performance)
    #   - /tmp/pdfconverter:/tmp

    # Netzwerk-Konfiguration
    networks:
      - pdfconverter-network

    # Logging Konfiguration
    # Begrenzt die Log-Größe um Speicherplatz zu sparen
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Labels für bessere Organisation
    labels:
      - "com.pdfconverter.description=PDF to PDF/A conversion service"
      - "com.pdfconverter.version=1.2.0"
      - "traefik.enable=false"  # Für Traefik Reverse Proxy (falls verwendet)

# Netzwerk-Definitionen
networks:
  pdfconverter-network:
    driver: bridge
    # Optional: Statisches Subnet
    # ipam:
    #   config:
    #     - subnet: 172.20.0.0/16

# Optionale Volume-Definitionen
# volumes:
#   pdfconverter-logs:
#     driver: local
