# Prometheus Configuration for PDF Converter Service

global:
  scrape_interval: 15s       # Scrape targets every 15 seconds
  evaluation_interval: 15s   # Evaluate rules every 15 seconds
  scrape_timeout: 10s        # Scrape timeout

  # Attach these labels to any time series or alerts
  external_labels:
    monitor: 'pdfconverter-monitor'
    environment: 'production'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
# rule_files:
#   - "alert.rules.yml"

# Scrape configurations
scrape_configs:
  # ==========================================
  # PDF Converter Service Metrics
  # ==========================================
  - job_name: 'pdfconverter'

    # Override global scrape interval for this job
    scrape_interval: 10s
    scrape_timeout: 5s

    # Metrics path (default is /metrics)
    metrics_path: '/metrics/'

    static_configs:
      - targets: ['pdfconverter:8080']
        labels:
          service: 'pdfconverter'
          tier: 'backend'

    # Relabel configs for better metric organization
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'pdfconverter'

  # ==========================================
  # Prometheus Self-Monitoring
  # ==========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          tier: 'monitoring'

  # ==========================================
  # Node Exporter - System Metrics
  # ==========================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          tier: 'monitoring'

# ==========================================
# Metric Relabeling (Optional)
# ==========================================
# metric_relabel_configs can be added here to
# filter or modify metrics before ingestion
